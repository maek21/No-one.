name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            electron-target: --win
            artifact-path: release\*.exe

          - os: macos-latest
            electron-target: --mac
            artifact-path: release/*.dmg

          - os: ubuntu-latest
            electron-target: --linux deb
            artifact-path: release/*.deb

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - run: echo "workspace=${{ github.workspace }}" && ls -la

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ruby ruby-dev upx-ucl
          sudo gem install fpm --no-document

      - name: Install system deps (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install upx

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build backend
        working-directory: backend
        run: python -m PyInstaller build.spec --clean -y

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install root deps
        run: npm ci

      - name: Package
        run: npx electron-builder ${{ matrix.electron-target }}
        env:
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - run: ls -la release/ && echo "--- artifact path: ${{ matrix.artifact-path }}"

      - uses: actions/upload-artifact@v4
        with:
          name: No-one-${{ matrix.os }}-${{ github.ref_name }}
          path: |
            ${{ matrix.artifact-path }}
